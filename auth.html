<!-- ============================================================
     auth.html — Two HTML snippets for the Beef Grading Drill app

     SNIPPET 1: Insert the block below into <header id="app-header">
                inside the .header-right div, AFTER #settings-btn.

     SNIPPET 2: Insert the modal block just before </body>.
     ============================================================ -->


<!-- ============================================================
     SNIPPET 1 — AUTH HEADER CONTROLS
     Insert into .header-right, after #settings-btn
     ============================================================ -->

<button id="auth-signin-btn" class="auth-signin-btn">Sign In</button>

<div id="auth-user-area" class="auth-user-area hidden">
  <img id="auth-avatar" class="auth-avatar" src="" alt="" />
  <span id="auth-display-name" class="auth-display-name"></span>
  <button id="auth-signout-btn" class="auth-signout-btn">Sign Out</button>
</div>


<!-- ============================================================
     SNIPPET 2 — AUTH MODAL
     Insert just before </body>
     ============================================================ -->

<div id="auth-modal" class="auth-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="auth-modal-heading">

  <div id="auth-modal-panel" class="auth-modal-panel">

    <button id="auth-modal-close" class="auth-modal-close" aria-label="Close sign-in dialog">&#x2715;</button>

    <div class="auth-modal-stamp">Weekly Challenge</div>

    <h2 id="auth-modal-heading" class="auth-modal-title">Sign In to Compete</h2>

    <p class="auth-modal-sub">Your score goes on the leaderboard. Sign in once, drill forever.</p>

    <!-- Google -->
    <button id="auth-google-btn" class="auth-provider-btn auth-google-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17.64 9.2045c0-.638-.0573-1.2518-.1636-1.8409H9v3.4814h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.2581h2.9087C16.6582 14.0127 17.64 11.8045 17.64 9.2045z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.4673-.8059 5.9564-2.1805l-2.9087-2.2581c-.8059.5405-1.8368.8591-3.0477.8591-2.3441 0-4.3282-1.5832-5.036-3.71H.9574v2.3318C2.4382 15.9832 5.4818 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.6818 9c0-.5905.1014-1.1645.2823-1.71V4.9582H.9574A9.0057 9.0057 0 0 0 0 9c0 1.4523.3477 2.8268.9574 4.0418L3.964 10.71z" fill="#FBBC05"/>
        <path d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.346l2.5814-2.5814C13.4632.8918 11.43 0 9 0 5.4818 0 2.4382 2.0168.9574 4.9582L3.964 7.29C4.6718 5.1627 6.6559 3.5795 9 3.5795z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- GitHub -->
    <button id="auth-github-btn" class="auth-provider-btn auth-github-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 0C5.3724 0 0 5.3724 0 12c0 5.3028 3.438 9.8004 8.2068 11.3876.6.1104.8196-.2604.8196-.5784 0-.2856-.0108-1.0428-.0156-2.0472-3.3384.7248-4.0416-1.608-4.0416-1.608-.5472-1.3884-1.332-1.7592-1.332-1.7592-1.092-.744.0816-.7284.0816-.7284 1.2036.0852 1.836 1.2348 1.836 1.2348 1.0728 1.836 2.8128 1.3056 3.4992 1.0008.1068-.7788.42-1.3056.7608-1.6056-2.664-.3024-5.4672-1.332-5.4672-5.9304 0-1.3092.468-2.3808 1.2348-3.2208-.12-.3036-.5364-1.524.1188-3.176 0 0 1.008-.3228 3.3 1.2312a11.496 11.496 0 0 1 3.0048-.4044c1.02.0048 2.0472.138 3.0048.4044 2.2908-1.554 3.2964-1.2312 3.2964-1.2312.6564 1.6524.2436 2.8728.12 3.176.768.84 1.2348 1.9116 1.2348 3.2208 0 4.608-2.808 5.6232-5.4816 5.9208.432.372.816 1.1016.816 2.2188 0 1.6032-.0144 2.8944-.0144 3.2868 0 .3204.2148.6936.8268.576C20.5656 21.7968 24 17.2968 24 12c0-6.6276-5.3724-12-12-12z"/>
      </svg>
      Continue with GitHub
    </button>

    <p class="auth-modal-disclaimer">No password needed. We only store your display name and score.</p>

  </div>

</div>
